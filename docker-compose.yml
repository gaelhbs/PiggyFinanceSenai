version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: piggy_postgres
    restart: always
    environment:
      POSTGRES_DB: piggy
      POSTGRES_USER: piggy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - piggy-network

  backend:
    build: .
    container_name: piggy_backend
    restart: always
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/piggy
      SPRING_DATASOURCE_USERNAME: piggy
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - piggy-network

  frontend:
    build: ./frontend
    container_name: piggy_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - piggy-network

volumes:
  pgdata:

networks:
  piggy-network:
    driver: bridge