services:
  postgres:
    image: postgres:16
    container_name: piggy_postgres
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: piggy
      POSTGRES_USER: piggy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - piggy-network

  backend:
    build: .
    container_name: piggy_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/piggy
      SPRING_DATASOURCE_USERNAME: piggy
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - postgres
    networks:
      - piggy-network

volumes:
  pgdata:

networks:
  piggy-network:
    driver: bridge
